name: youtube-broken-link-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets exist
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          [ -n "$YOUTUBE_API_KEY" ] || (echo "Missing YOUTUBE_API_KEY" && exit 1)
          [ -n "$SUPABASE_URL" ] || (echo "Missing SUPABASE_URL" && exit 1)
          [ -n "$SUPABASE_KEY" ] || (echo "Missing SUPABASE_KEY" && exit 1)
          echo "Secrets are present"

      - name: Run scan
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scan.py
